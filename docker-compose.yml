services:
  mongo:
    image: mongo:8.0
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'try { rs.status().ok } catch (e) { rs.initiate({_id:\"rs0\",members:[{_id:0,host:\"mongo:27017\"}]}).ok }' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build: ./backend
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/goldex?replicaSet=rs0
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  mongo-data:
  uploads:
